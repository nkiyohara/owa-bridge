name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Verify, sign, and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write # Create the draft, attach its signature, and publish it.
      id-token: write # Exchange GitHub OIDC for the keyless signing certificate.
    steps:
      - name: Check out source and tags
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require a tag reachable from main
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Install the locked release and signing toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.7
          experimental: true
          install_args: "go goreleaser syft cosign go:github.com/google/go-licenses/v2"
          cache: false

      - name: Verify source before packaging
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go test -shuffle=on ./...
          goreleaser check

      - name: Build SBOM-bearing draft release
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render package-catalog manifests
        run: go run ./tools/catalogrender --dist dist

      - name: Verify every release output
        run: go run ./tools/releaseverify --dist dist

      - name: Preserve verified package-catalog manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-catalogs-${{ github.ref_name }}
          path: |
            dist/homebrew/Formula/owa-bridge.rb
            dist/scoop/owa-bridge.json
            dist/winget/manifests
          if-no-files-found: error
          retention-days: 30

      - name: Sign the verified checksum manifest
        run: >-
          cosign sign-blob
          --yes
          --bundle dist/checksums.txt.sigstore.json
          dist/checksums.txt

      - name: Attach signature bundle to the verified draft
        run: >-
          gh release upload "$GITHUB_REF_NAME"
          dist/checksums.txt.sigstore.json
          --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish the verified release
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease
          else
            gh release edit "$GITHUB_REF_NAME" --draft=false --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-owned-catalogs:
    name: Publish Homebrew and Scoop catalogs
    if: ${{ !contains(github.ref_name, '-') }}
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read # Download the verified catalog artifact from this run.
      contents: read
    steps:
      - name: Download verified package-catalog manifests
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: package-catalogs-${{ github.ref_name }}
          path: catalogs

      - name: Check out Homebrew tap
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: nkiyohara/homebrew-owa-bridge
          path: repositories/homebrew
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          # The following push requires this repo-scoped deploy key; no later step uploads artifacts.
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Publish Homebrew Formula
        run: |
          install -m 0644 \
            catalogs/homebrew/Formula/owa-bridge.rb \
            repositories/homebrew/Formula/owa-bridge.rb
          git -C repositories/homebrew diff --check
          if git -C repositories/homebrew diff --quiet -- Formula/owa-bridge.rb; then
            echo "Homebrew Formula is already current."
            exit 0
          fi
          git -C repositories/homebrew config user.name "github-actions[bot]"
          git -C repositories/homebrew config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C repositories/homebrew add Formula/owa-bridge.rb
          git -C repositories/homebrew commit -m "chore: update owa-bridge to ${GITHUB_REF_NAME#v}"
          git -C repositories/homebrew push origin HEAD:main

      - name: Check out Scoop bucket
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: nkiyohara/scoop-owa-bridge
          path: repositories/scoop
          ssh-key: ${{ secrets.SCOOP_BUCKET_DEPLOY_KEY }}
          # The following push requires this repo-scoped deploy key; no later step uploads artifacts.
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Publish Scoop manifest
        run: |
          install -m 0644 \
            catalogs/scoop/owa-bridge.json \
            repositories/scoop/owa-bridge.json
          git -C repositories/scoop diff --check
          if git -C repositories/scoop diff --quiet -- owa-bridge.json; then
            echo "Scoop manifest is already current."
            exit 0
          fi
          git -C repositories/scoop config user.name "github-actions[bot]"
          git -C repositories/scoop config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C repositories/scoop add owa-bridge.json
          git -C repositories/scoop commit -m "chore: update owa-bridge to ${GITHUB_REF_NAME#v}"
          git -C repositories/scoop push origin HEAD:main

  submit-winget:
    name: Submit WinGet manifest
    if: ${{ !contains(github.ref_name, '-') }}
    needs: release
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      actions: read # Download the verified catalog artifact from this run.
      contents: read
    steps:
      - name: Download verified package-catalog manifests
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: package-catalogs-${{ github.ref_name }}
          path: catalogs

      - name: Guard against duplicate WinGet pull requests
        id: winget_pr_guard
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            throw "WINGET_CREATE_GITHUB_TOKEN is not configured"
          }
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $headers = @{
            Authorization = "Bearer $env:WINGET_CREATE_GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $query = [uri]::EscapeDataString(
            "repo:microsoft/winget-pkgs is:pr is:open author:nkiyohara in:title nkiyohara.OWABridge"
          )
          $response = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/search/issues?q=$query&per_page=100"
          $open = @($response.items)
          $sameVersion = @($open | Where-Object {
            $_.title -match [regex]::Escape($version)
          })
          if ($sameVersion.Count -gt 0) {
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "WinGet pull request for $version already exists; submission is current."
          } elseif ($open.Count -gt 0) {
            $urls = ($open | ForEach-Object { $_.html_url }) -join ", "
            throw "An earlier WinGet pull request is still open: $urls"
          } else {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Set up .NET for WinGetCreate
        if: steps.winget_pr_guard.outputs.skip != 'true'
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: 6.0.428

      - name: Install pinned WinGetCreate
        if: steps.winget_pr_guard.outputs.skip != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/winget-create/releases/download/v1.12.8.0/wingetcreate.exe"
          $expected = "8bd738851b524885410112678e3771b341c5c716de60fbbecb88ab0a363ed85d"
          Invoke-WebRequest $url -OutFile wingetcreate.exe
          $actual = (Get-FileHash wingetcreate.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "WinGetCreate checksum mismatch: $actual"
          }

      - name: Submit verified WinGet manifests
        if: steps.winget_pr_guard.outputs.skip != 'true'
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $manifest = Join-Path "catalogs/winget/manifests/n/nkiyohara/OWABridge" $version
          ./wingetcreate.exe submit --prtitle "Update nkiyohara.OWABridge to $version" --no-open $manifest
