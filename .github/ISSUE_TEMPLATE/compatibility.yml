name: Compatibility observation
description: Report a content-free opt-in Outlook Web compatibility result.
title: "compat: "
body:
  - type: markdown
    attributes:
      value: |
        Do not include tenant names, addresses, message/event IDs, request IDs,
        subjects, bodies, screenshots, browser captures, cookies, or tokens.

  - type: input
    id: version
    attributes:
      label: owa version
      description: Paste the version and commit from `owa version --json`.
      placeholder: v0.2.0 / 0123456789abcdef
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - amd64
        - arm64
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser family
      options:
        - Google Chrome
        - Chromium
        - Microsoft Edge
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Mail deployment class
      options:
        - Microsoft 365 work or school
        - Outlook.com personal
        - Exchange hybrid
        - Exchange on-premises
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Content-free doctor result
      description: Review local paths, then paste `owa doctor --online --json`.
      render: json
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: 140.0.0.0
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Safety confirmation
      options:
        - label: I was authorized to access the tested mailbox.
          required: true
        - label: I reviewed this report and removed mailbox and session data.
          required: true
