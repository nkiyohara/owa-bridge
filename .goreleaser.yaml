version: 2

project_name: owa-bridge

before:
  hooks:
    - go mod vendor
    - >-
        go-licenses check ./cmd/owa
        --ignore github.com/nkiyohara/owa-bridge
    - >-
        go-licenses save ./cmd/owa
        --ignore github.com/nkiyohara/owa-bridge
        --save_path .release/third_party_licenses
        --force
    - >-
        go run ./tools/normalizefiles
        --root .release/third_party_licenses
        --time {{ .CommitDate }}
    - >-
        go build -trimpath
        -ldflags=-X=main.releaseTimestamp={{ .CommitDate }}
        -o .release/syft-reproducible
        ./tools/syftreproducible

builds:
  - id: owa
    main: ./cmd/owa
    binary: owa
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-mod=readonly
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - >-
        -s -w -buildid=
        -X github.com/nkiyohara/owa-bridge/internal/buildinfo.version={{ .Version }}
        -X github.com/nkiyohara/owa-bridge/internal/buildinfo.commit={{ .Commit }}
        -X github.com/nkiyohara/owa-bridge/internal/buildinfo.buildDate={{ .CommitDate }}

archives:
  - id: release
    ids:
      - owa
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    builds_info:
      mode: 0755
      mtime: "{{ .CommitDate }}"
    files:
      - src: LICENSE
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: README.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: SECURITY.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: CHANGELOG.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: docs/install.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: docs/mcp.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: plugins/owa-bridge/README.md
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: plugins/owa-bridge/**/*
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .agents/plugins/marketplace.json
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .claude-plugin/marketplace.json
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/owa.bash
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/_owa
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/owa.fish
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: manpages/owa.1
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .release/third_party_licenses/**/*
        dst: third_party_licenses
        info:
          mode: 0644
          mtime: "{{ .CommitDate }}"

nfpms:
  - id: linux-packages
    ids:
      - owa
    package_name: owa-bridge
    # GitHub rewrites '~' in release asset names, which otherwise makes the
    # checksum manifest unverifiable for prerelease deb and RPM packages.
    file_name_template: '{{ replace .ConventionalFileName "~" "_" }}'
    vendor: owa-bridge contributors
    homepage: https://github.com/nkiyohara/owa-bridge
    maintainer: owa-bridge maintainers <nkiyohara@users.noreply.github.com>
    description: >-
      Local-first Outlook Web mail and calendar CLI, session owner, and MCP
      server.
    license: Apache-2.0
    formats:
      - apk
      - deb
      - rpm
    bindir: /usr/bin
    mtime: "{{ .CommitDate }}"
    section: utils
    priority: optional
    release: "1"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/owa-bridge/LICENSE
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: README.md
        dst: /usr/share/doc/owa-bridge/README.md
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: CHANGELOG.md
        dst: /usr/share/doc/owa-bridge/CHANGELOG.md
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/owa.bash
        dst: /usr/share/bash-completion/completions/owa
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/_owa
        dst: /usr/share/zsh/site-functions/_owa
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: completions/owa.fish
        dst: /usr/share/fish/vendor_completions.d/owa.fish
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: manpages/owa.1
        dst: /usr/share/man/man1/owa.1
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: plugins/owa-bridge/
        dst: /usr/share/owa-bridge/plugins/owa-bridge
        type: tree
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .agents/plugins/marketplace.json
        dst: /usr/share/owa-bridge/.agents/plugins/marketplace.json
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .claude-plugin/marketplace.json
        dst: /usr/share/owa-bridge/.claude-plugin/marketplace.json
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"
      - src: .release/third_party_licenses/
        dst: /usr/share/doc/owa-bridge/third_party_licenses
        type: tree
        file_info:
          mode: 0644
          mtime: "{{ .CommitDate }}"

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"
  format: tar.gz
  prefix_template: "{{ .ProjectName }}-{{ .Version }}/"
  files:
    - src: vendor/modules.txt
      info:
        mode: 0644
        mtime: "{{ .CommitDate }}"
    - src: vendor/**/*
      info:
        mode: 0644
        mtime: "{{ .CommitDate }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: source-spdx
    artifacts: source
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.spdx.json"
    args:
      - "${artifact}"
      - --output
      - "spdx-json=${document}"
      - --enrich
      - all
  - id: source-cyclonedx
    artifacts: source
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.cdx.json"
    args:
      - "${artifact}"
      - --output
      - "cyclonedx-json=${document}"
      - --enrich
      - all
  - id: spdx
    artifacts: archive
    ids:
      - release
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.spdx.json"
    args:
      - "${artifact}"
      - --output
      - "spdx-json=${document}"
      - --enrich
      - all
  - id: cyclonedx
    artifacts: archive
    ids:
      - release
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.cdx.json"
    args:
      - "${artifact}"
      - --output
      - "cyclonedx-json=${document}"
      - --enrich
      - all
  - id: package-spdx
    artifacts: package
    ids:
      - linux-packages
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.spdx.json"
    args:
      - "${artifact}"
      - --output
      - "spdx-json=${document}"
      - --enrich
      - all
  - id: package-cyclonedx
    artifacts: package
    ids:
      - linux-packages
    cmd: ../.release/syft-reproducible
    documents:
      - "${artifact}.cdx.json"
    args:
      - "${artifact}"
      - --output
      - "cyclonedx-json=${document}"
      - --enrich
      - all

changelog:
  use: git
  sort: asc

release:
  draft: true
  replace_existing_draft: false
  prerelease: auto
  make_latest: false
  name_template: "owa-bridge {{ .Tag }}"
  header: |
    Local-first Outlook Web mail and calendar for humans, scripts, and AI
    agents. Verify the checksum and review the compatibility notes before using
    this build with an authorized mailbox.
