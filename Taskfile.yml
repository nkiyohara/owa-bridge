version: "3"

set: [errexit, nounset, pipefail]

vars:
  BINARY: bin/owa

tasks:
  default:
    desc: Show available development tasks
    cmds:
      - task --list

  setup:
    desc: Install the pinned development toolchain with mise
    cmds:
      - mise install

  format:
    desc: Format Go source files
    cmds:
      - gofmt -w $(rg --files -g '*.go' -g '!vendor/**')

  format:check:
    desc: Verify Go source formatting
    cmds:
      - test -z "$(gofmt -l $(rg --files -g '*.go' -g '!vendor/**'))"

  docs:
    desc: Lint Markdown documentation
    cmds:
      - markdownlint-cli2 "**/*.md" "#.git" "#.release" "#vendor"

  vet:
    desc: Run the Go static analyzer
    cmds:
      - go vet ./...

  lint:
    desc: Run the configured Go linters
    cmds:
      - golangci-lint run

  test:
    desc: Run deterministic unit and contract tests
    cmds:
      - go test -shuffle=on -coverprofile=coverage.out ./...

  race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  vuln:
    desc: Check dependencies for known reachable vulnerabilities
    cmds:
      - govulncheck ./...

  licenses:
    desc: Check licenses of dependencies linked into the release binary
    cmds:
      - >-
        go-licenses check ./cmd/owa
        --ignore github.com/nkiyohara/owa-bridge

  secrets:
    desc: Scan repository history and the working tree for committed secrets
    cmds:
      - gitleaks git --redact --no-banner .
      - gitleaks dir --redact --no-banner .

  build:
    desc: Build the local CLI
    cmds:
      - mkdir -p bin
      - go build -trimpath -o {{.BINARY}} ./cmd/owa

  release:check:
    desc: Validate the GoReleaser configuration
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build all release archives and SBOMs without publishing
    cmds:
      - goreleaser release --snapshot --clean
      - go run ./tools/catalogrender --dist dist
      - go run ./tools/releaseverify --dist dist

  actions:
    desc: Lint GitHub Actions workflows
    cmds:
      - actionlint
      - zizmor --pedantic .github/workflows

  verify:
    desc: Run every local quality gate
    cmds:
      - task: format:check
      - task: docs
      - task: vet
      - task: lint
      - task: test
      - task: race
      - task: secrets
      - task: vuln
      - task: licenses
      - task: build
      - task: release:check
      - task: actions
